name: Integrity Emulator

on:
  schedule:
    # Nightly at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  integrity-emulator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Run emulator-backed integrity tests
        run: npm run test:integrity:emulator
